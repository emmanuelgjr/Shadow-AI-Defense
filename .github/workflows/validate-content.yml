name: Validate content
on:
  pull_request:
    paths:
      - 'src/content/**'
      - 'scripts/validate-content.ts'
      - 'src/content/config.ts'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run test
